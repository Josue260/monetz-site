<text x="90" y="1602" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#15233f" font-weight="400"  text-anchor="start">tradicionais.</text>
<rect x="530" y="1500" width="450" height="128" rx="16" ry="16" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<circle cx="566" cy="1544" r="14" fill="#F4B400"/>
<text x="566" y="1550" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0C2149" font-weight="800"  text-anchor="middle">✓</text>
<text x="592" y="1550" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0C2149" font-weight="800"  text-anchor="start">Pagamento que acompanha as vendas</text>
<text x="560" y="1582" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#15233f" font-weight="400"  text-anchor="start">Em mês fraco, desconta menos. Não aperta o seu caixa.</text>
<rect x="60" y="1650" width="450" height="128" rx="16" ry="16" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<circle cx="96" cy="1694" r="14" fill="#F4B400"/>
<text x="96" y="1700" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0C2149" font-weight="800"  text-anchor="middle">✓</text>
<text x="122" y="1700" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0C2149" font-weight="800"  text-anchor="start">Sem boleto e sem trocar maquininha</text>
<text x="90" y="1732" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#15233f" font-weight="400"  text-anchor="start">Mantém a sua rotina e a maquininha que você já usa.</text>
<rect x="530" y="1650" width="450" height="128" rx="16" ry="16" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<circle cx="566" cy="1694" r="14" fill="#F4B400"/>
<text x="566" y="1700" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0C2149" font-weight="800"  text-anchor="middle">✓</text>
<text x="592" y="1700" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0C2149" font-weight="800"  text-anchor="start">Rápido e sem burocracia</text>
<text x="560" y="1732" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#15233f" font-weight="400"  text-anchor="start">Análise simples e liberação em poucos dias.</text>
<rect x="0" y="1800" width="1000" height="130" rx="0" ry="0" fill="#F4B400"/>
<text x="60" y="1858" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#0C2149" font-weight="800"  text-anchor="start">Descubra quanto a sua loja tem disponível</text>
<text x="60" y="1890" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0C2149" font-weight="400"  text-anchor="start">Simulação gratuita e sem compromisso.</text>
<rect x="700" y="1838" width="240" height="56" rx="10" ry="10" fill="#0C2149"/>
<text x="820" y="1873" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FFFFFF" font-weight="800"  text-anchor="middle">Solicitar simulação</text>
<rect x="0" y="1934" width="300" height="52" rx="12" ry="12" fill="#B3A268"/>
<text x="28" y="1970" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#0C2149" font-weight="800"  text-anchor="start">Perguntas frequentes</text>
<rect x="60" y="2004" width="880" height="76" rx="12" ry="12" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<text x="84" y="2036" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0C2149" font-weight="800"  text-anchor="start">Preciso trocar de maquininha?</text>
<text x="84" y="2060" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b6776" font-weight="400"  text-anchor="start">Não. Você mantém a maquininha que já usa; a da Monetz é opcional.</text>
<rect x="60" y="2092" width="880" height="76" rx="12" ry="12" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<text x="84" y="2124" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0C2149" font-weight="800"  text-anchor="start">A parcela é fixa?</text>
<text x="84" y="2148" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b6776" font-weight="400"  text-anchor="start">Não. É uma parte das suas vendas no cartão; o valor por dia acompanha o movimento.</text>
<rect x="60" y="2180" width="880" height="76" rx="12" ry="12" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<text x="84" y="2212" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0C2149" font-weight="800"  text-anchor="start">Quanto demora a aprovação?</text>
<text x="84" y="2236" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b6776" font-weight="400"  text-anchor="start">A análise é simples e a liberação leva poucos dias úteis.</text>
<rect x="60" y="2268" width="880" height="76" rx="12" ry="12" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<text x="84" y="2300" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0C2149" font-weight="800"  text-anchor="start">Tem valor mínimo e máximo?</text>
<text x="84" y="2324" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b6776" font-weight="400"  text-anchor="start">Sim. O limite depende do seu faturamento no cartão e da análise.</text>
<rect x="60" y="2356" width="880" height="76" rx="12" ry="12" fill="#FFFFFF" stroke="#E7E1D2" stroke-width="1"/>
<text x="84" y="2388" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0C2149" font-weight="800"  text-anchor="start">Tem IOF ou tarifas?</text>
<text x="84" y="2412" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b6776" font-weight="400"  text-anchor="start">O IOF é o imposto padrão de crédito. Você vê o custo total na proposta.</text>
